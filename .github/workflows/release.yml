name: Release

# Tag a version to publish a GitHub Release with the prebuilt tarball:
#   npm version 0.2.0 --no-git-tag-version   # bump package.json
#   git commit -am "Release v0.2.0"
#   git tag v0.2.0 && git push && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm validate

      # Build dist/ and pack the publishable tarball (includes dist + types + css).
      - run: pnpm build
      - run: pnpm pack --pack-destination .

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Create GitHub Release with tarball
        uses: softprops/action-gh-release@v2
        with:
          files: aymurai-ui-*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true
