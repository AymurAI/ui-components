name: Deploy Storybook to Pages

# Builds the Storybook static site and publishes it to GitHub Pages for every
# release tag. Enable once in Settings → Pages → Source: "GitHub Actions".
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Mirrors release.yml's check so Pages never publishes docs for a tag
      # that release.yml would reject (workflow_dispatch has no tag, so skip there).
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json ($PKG_VERSION)" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      # Generate the Panda styled-system the stories import from.
      - run: pnpm codegen
      - run: pnpm build-storybook
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
